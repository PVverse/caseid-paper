name: Deploy Analysis HTML to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'analysis/Analyses.html'
      - 'analysis/Analyses_files/**'
      - 'analysis/site_libs/**'
      - '.github/workflows/deploy-analysis-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site

          # Make the Quarto HTML report the Pages homepage
          cp analysis/Analyses.html _site/index.html

          # Copy Quarto-generated support folders if they exist
          if [ -d analysis/Analyses_files ]; then
            cp -r analysis/Analyses_files _site/
          fi

          if [ -d analysis/site_libs ]; then
            cp -r analysis/site_libs _site/
          fi

          # Avoid Jekyll processing
          touch _site/.nojekyll

          echo "Prepared site:"
          find _site -maxdepth 2 -type f

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4