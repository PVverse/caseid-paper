name: Render Quarto Analysis

on:
  push:
    branches: [ main ]
    paths:
      - 'analysis/Analyses.qmd'
      - 'R/functions.R'
      - 'data/**'
      - '.github/workflows/render-analysis.yml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          extra-packages: |
            any::readxl
            any::dplyr
            any::stringr
            any::janitor
            any::tidyr
            any::purrr
            any::irr
            any::writexl
            any::data.table
            any::ggplot2
            any::ggpattern
            any::ComplexUpset
            any::patchwork
            any::plotly
            any::ggnewscale
            any::scales
            any::utf8
            any::here

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Render Quarto document
        run: |
          quarto render analysis/Analyses.qmd --to html
        env:
          QUARTO_PRINT_STACK: true

      - name: Check if HTML was generated
        run: |
          if [ ! -f "analysis/Analyses.html" ]; then
            echo "❌ HTML file not generated"
            exit 1
          fi
          echo "✅ HTML file generated successfully"
          ls -lh analysis/Analyses.html

      - name: Commit and push rendered output
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add analysis/Analyses.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-render Quarto analysis [skip ci]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Analysis rendered successfully! View the [full report](https://github.com/${{ github.repository }}/blob/${{ github.head_ref }}/analysis/Analyses.html)'
            })

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-analysis
          path: analysis/Analyses.html
          retention-days: 30
